name: "Reference TVC Booster"
mass:
  dry_kg: 2200
  propellant_kg: 8800
  dry_cg_from_nose_m: 6.1
  propellant_cg_from_nose_m: 4.8   # at full load; migrates aft toward the tank bottom as it drains
  tank_bottom_from_nose_m: 8.8     # aft end of the propellant column (plan A5)
  tank_radius_m: 0.6               # = vehicle radius; full column height = 2*(8.8-4.8) = 8.0 m
  dry_inertia_kgm2: { Ixx: 450, Iyy: 18500, Izz: 18500 }   # about the dry CG (plan A6)
geometry:
  length_m: 12.0
  diameter_m: 1.2
  ref_area_m2: 1.131
propulsion:
  thrust_curve_file: "data/thrust-curves/booster_main.csv"
  isp_sea_level_s: 282
  isp_vacuum_s: 311
  gimbal:
    max_deflection_deg: 6.0
    max_slew_rate_dps: 20
    position_from_nose_m: 11.8
  throttle: { min: 0.4, max: 1.0 }   # plan A7
aero:
  table_file: "data/aero-tables/booster_aero.csv"
  cp_from_nose_m: 5.4   # full-load margin +0.28 cal; goes negative as the long propellant column drains aft (trap T1)
ascent:
  kick_start_s: 6.0
  kick_duration_s: 1.0
  kick_deflection_deg: 0.15   # gentle tip-off; aero weathervaning carries the gravity turn
control:
  pid_pitch: { kp: 0.8, ki: 0.05, kd: 0.6 }
  pid_yaw:   { kp: 0.8, ki: 0.05, kd: 0.6 }
  guidance_mode: "powered_descent"
  landing_target: { lat: 0.0, lon: 0.0, touchdown_vz_max_mps: 2.0 }
  descent:                       # powered-descent guidance (README §4.6 mode 3, plan A7)
    rated_thrust_n: 50000        # landing-engine rating; throttle band 0.4-1.0 straddles hover
    ignition_margin: 0.3         # ignite at h = v²/(2·a_max)·1.3
    touchdown_speed_mps: 1.0     # commanded terminal descent rate
    max_tilt_deg: 8.0            # position-loop tilt authority
    pid_vz:  { kp: 0.15, ki: 0.05, kd: 0.0 }    # throttle per (m/s)
    pid_pos: { kp: 0.004, ki: 0.0, kd: 0.03 }   # tilt (rad) per m, per (m/s)
